{% extends 'base.html' %}

{% block title %}Giriş Yap - YemekSepeti{% endblock %}

{% block extra_css %}
<!-- giriş sayfasına özel stiller -->
<style>
    .login-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
    }

    .login-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 450px;
    }

    .login-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .login-icon {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        color: white;
        font-size: 2rem;
    }

    .login-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 8px;
    }

    .login-subtitle {
        color: #666;
        font-size: 0.95rem;
    }

    .form-label {
        font-weight: 600;
        color: #444;
        margin-bottom: 8px;
        font-size: 0.95rem;
    }

    .form-control {
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        padding: 12px 15px;
        font-size: 1rem;
        transition: all 0.3s;
    }

    .form-control:focus {
        border-color: #ff6b6b;
        box-shadow: 0 0 0 0.2rem rgba(255, 107, 107, 0.15);
    }

    .input-group-text {
        background-color: #f8f9fa;
        border: 2px solid #e0e0e0;
        border-right: none;
        border-radius: 10px 0 0 10px;
        color: #666;
    }

    .input-group .form-control {
        border-left: none;
        border-radius: 0 10px 10px 0;
    }

    .input-group:focus-within .input-group-text {
        border-color: #ff6b6b;
    }

    .btn-login {
        background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 1.05rem;
        font-weight: 600;
        color: white;
        width: 100%;
        margin-top: 10px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        background: linear-gradient(135deg, #ff5252 0%, #ff6b6b 100%);
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .form-check {
        margin: 15px 0;
    }

    .form-check-label {
        color: #666;
        font-size: 0.9rem;
        cursor: pointer;
    }

    .forgot-password {
        color: #ff6b6b;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        float: right;
        margin-top: 15px;
    }

    .forgot-password:hover {
        color: #ff5252;
        text-decoration: underline;
    }

    .divider {
        text-align: center;
        margin: 25px 0;
        position: relative;
    }

    .divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #e0e0e0;
    }

    .divider-text {
        background: white;
        padding: 0 15px;
        color: #999;
        font-size: 0.9rem;
        position: relative;
        display: inline-block;
    }

    .signup-link {
        text-align: center;
        margin-top: 25px;
        padding-top: 25px;
        border-top: 1px solid #e0e0e0;
    }

    .signup-link p {
        color: #666;
        margin: 0;
        font-size: 0.95rem;
    }

    .signup-link a {
        color: #ff6b6b;
        text-decoration: none;
        font-weight: 600;
        margin-left: 5px;
    }

    .signup-link a:hover {
        color: #ff5252;
        text-decoration: underline;
    }

    @media (max-width: 576px) {
        .login-card {
            padding: 30px 25px;
        }

        .login-title {
            font-size: 1.5rem;
        }

        .forgot-password {
            float: none;
            display: block;
            margin-top: 10px;
            text-align: right;
        }
    }
</style>
{% endblock %}

{% block content %}
<!-- giriş formunu ortalayan ana alan -->
<div class="login-container">
    <div class="login-card">
        <!-- giriş sayfası başlığı -->
        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-person-circle"></i>
            </div>
            <h1 class="login-title">Hoş Geldiniz</h1>
            <p class="login-subtitle">Hesabınıza giriş yapın</p>
        </div>

        <!-- kullanıcı giriş formu -->
        <form method="post" action="">
            {% csrf_token %}

            <!-- e-posta girişi -->
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="bi bi-envelope"></i> E-posta
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-at"></i>
                    </span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="ornek@email.com"
                        required>
                </div>
            </div>

            <!-- şifre girişi -->
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-lock"></i> Şifre
                </label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-key"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••"
                        required>
                </div>
            </div>

            <!-- giriş butonu -->
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Giriş Yap
            </button>
        </form>

        <!-- kayıt olmayan kullanıcılar için -->
        <div class="signup-link">
            <p>
                Hesabın yok mu?
                <a href="{% url 'register' %}">Kayıt ol</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
